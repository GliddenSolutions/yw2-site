<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="YW2 Logo">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" stroke="#1B72D8" stroke-width="6" />

  <!-- Thin orange axis -->
  <line x1="15" y1="134" x2="185" y2="66" stroke="#F59200" stroke-width="2" stroke-linecap="round"/>

  <!-- Blue elements -->
  <!-- Center top vertical -->
  <line x1="100" y1="10" x2="100" y2="100" stroke="#1B72D8" stroke-width="6" stroke-linecap="round"/>
  <!-- Left triangle top part (blue) -->
  <polyline points="50,120 50,60 100,100" fill="none" stroke="#1B72D8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right triangle top diagonal (blue) -->
  <line x1="100" y1="40" x2="150" y2="80" stroke="#1B72D8" stroke-width="6" stroke-linecap="round"/>

  <!-- Orange elements -->
  <!-- Center bottom vertical -->
  <line x1="100" y1="100" x2="100" y2="190" stroke="#F59200" stroke-width="6" stroke-linecap="round"/>
  <!-- Left triangle bottom diagonal (orange) -->
  <line x1="50" y1="120" x2="100" y2="160" stroke="#F59200" stroke-width="6" stroke-linecap="round"/>
  <!-- Right triangle bottom part (orange) -->
  <polyline points="100,100 150,140 150,80" fill="none" stroke="#F59200" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
